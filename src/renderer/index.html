<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divergence Launcher</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #f8fafc;
        color: #171d29;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #111827;
          color: #f1f5f9;
        }
      }

      .startup-loader {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .startup-loader__content {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #64748b;
        font-size: 14px;
        font-weight: 500;
      }

      .startup-loader__spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(15, 118, 89, 0.24);
        border-top-color: #0f766e;
        border-radius: 9999px;
        animation: divergence-spin 0.8s linear infinite;
      }

      @keyframes divergence-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="startup-loader" aria-label="Loading Divergence Launcher">
        <div class="startup-loader__content">
          <div class="startup-loader__spinner"></div>
          <span>Loading Divergence Launcher</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
