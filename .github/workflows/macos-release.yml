name: macOS Release Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-macos-arm64:
    name: Build macOS arm64 artifact
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run release:check

      - name: Package macOS app
        run: npm run package:mac:ci

      - name: Inspect packaged output
        run: |
          pwd
          sw_vers
          uname -m
          find out -maxdepth 5 -print || true
          find ../.divergence-launcher-electron-packager-tmp -maxdepth 5 -print || true

      - name: Create macOS ZIP
        run: npm run zip:mac

      - name: Verify release artifact
        run: npm run verify:mac-artifact

      - name: Upload macOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: divergence-launcher-darwin-arm64
          path: out/make/zip/darwin/arm64/*.zip
          if-no-files-found: error
